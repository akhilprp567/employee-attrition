{% extends "base.html" %}

{% block title %}Login - Employee Attrition System{% endblock %}

{% block content %}
<div class="container d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <div class="card shadow" style="width: 100%; max-width: 450px;">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <div class="mb-3">
                    <i class="bi bi-graph-up display-4 text-primary"></i>
                </div>
                <h2 class="card-title mb-2">Welcome Back</h2>
                <p class="text-muted">Employee Attrition Prediction System</p>
            </div>

            <!-- ✅ FIXED FORM -->
            <form method="POST" action="{{ url_for('auth.login') }}">
                
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" class="form-control" name="username" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" name="password" required>
                </div>

                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" name="remember">
                    <label class="form-check-label">Remember me</label>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-2">
                    Sign In
                </button>

            </form>

            <hr>

            <div class="text-center">
                <p class="text-muted mb-0">Don't have an account? 
                    <a href="{{ url_for('auth.signup') }}">
                        Create one here
                    </a>
                </p>
            </div>

            <div class="alert alert-info mt-4 mb-0">
                <small>
                    <strong>Demo Credentials:</strong><br>
                    Username: demo<br>
                    Password: demo123
                </small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
